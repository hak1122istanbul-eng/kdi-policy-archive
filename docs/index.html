<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDI 정책자료 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <header class="mb-8 p-6 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white flex items-center gap-2">
                    <i data-lucide="library" class="w-8 h-8 text-blue-600 dark:text-blue-400"></i>
                    KDI 정책자료 아카이브
                </h1>
                <p class="mt-2 text-sm text-gray-500 dark:text-gray-400 flex items-center gap-2">
                    <i data-lucide="info" class="w-4 h-4"></i>
                    KDI 경제정보센터 RSS 누적 (<span id="total-count">0</span>건)
                </p>
            </div>
            <div class="flex items-center gap-3">
                <button id="manage-categories-btn" class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-colors">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    카테고리 설정
                </button>
                <span class="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-full" id="last-updated">업데이트: -</span>
                <span class="text-[10px] text-blue-500 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-2 py-1 rounded-lg border border-blue-100 dark:border-blue-800 font-medium animate-pulse">매시간 자동 업데이트 중</span>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar (Filters & Stats) -->
            <aside class="lg:col-span-1 flex flex-col gap-6">
                <!-- Filters Panel -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5 sticky top-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="filter" class="w-5 h-5"></i> 필터
                    </h2>
                    
                    <!-- Search -->
                    <div class="mb-5 relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="검색어 입력..." 
                            class="w-full pl-9 pr-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all dark:text-white">
                    </div>

                    <!-- Categories -->
                    <div class="mb-5">
                        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">카테고리</h3>
                        <div id="category-filters" class="flex flex-wrap gap-2">
                            <!-- Categories will be rendered here -->
                        </div>
                    </div>

                    <!-- Date Range -->
                    <div class="mb-5">
                        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">기간</h3>
                        <select id="date-filter" class="w-full p-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm outline-none dark:text-white">
                            <option value="all">전체</option>
                            <option value="7d">최근 7일</option>
                            <option value="30d">최근 30일</option>
                            <option value="1y">최근 1년</option>
                        </select>
                    </div>

                    <!-- Sort -->
                    <div class="mb-6">
                        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">정렬</h3>
                        <select id="sort-filter" class="w-full p-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm outline-none dark:text-white">
                            <option value="desc">최신순</option>
                            <option value="asc">오래된순</option>
                        </select>
                    </div>

                    <button id="download-csv" class="w-full py-2 px-4 bg-gray-900 hover:bg-gray-800 dark:bg-gray-100 dark:hover:bg-white dark:text-gray-900 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> 결과 CSV 다운로드
                    </button>
                </div>
            </aside>

            <!-- Feed List -->
            <main class="lg:col-span-3">
                <div class="mb-4 flex items-center justify-between">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        검색 결과 <span id="result-count" class="font-semibold text-gray-900 dark:text-white">0</span>건
                    </p>
                </div>
                
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-600 dark:text-gray-400">
                            <thead class="text-xs text-gray-500 bg-gray-50/80 dark:bg-gray-700/50 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700 whitespace-nowrap">
                                <tr>
                                    <th scope="col" class="px-4 py-4 font-medium text-center w-16">번호</th>
                                    <th scope="col" class="px-4 py-4 font-medium text-center w-28">분류</th>
                                    <th scope="col" class="px-4 py-4 font-medium">제목</th>
                                    <th scope="col" class="px-4 py-4 font-medium text-center w-32">출처</th>
                                    <th scope="col" class="px-4 py-4 font-medium text-center w-28">등록일</th>
                                    <th scope="col" class="px-4 py-4 font-medium text-center w-20">링크</th>
                                </tr>
                            </thead>
                            <tbody id="items-container" class="divide-y divide-gray-100 dark:divide-gray-700">
                                <!-- Items will be rendered here -->
                                <tr>
                                    <td colspan="6" class="text-center py-12 text-gray-500" id="loading-indicator">
                                        <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin mb-2"></i>
                                        데이터를 불러오는 중...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="pagination" class="mt-8 flex justify-center gap-2 flex-wrap">
                    <!-- Pagination will be rendered here -->
                </div>
            </main>
        </div>
        
        <!-- Stats Section -->
        <div class="mt-12 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i> 통계
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <canvas id="categoryChart"></canvas>
                </div>
                <div>
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-sm text-gray-500 py-6 border-t border-gray-200 dark:border-gray-700">
            <p>본 사이트는 KDI 경제정보센터 RSS를 수집·재배열한 비공식 아카이브입니다.</p>
            <p class="mt-1">원문 저작권은 KDI 및 각 발행기관에 있습니다.</p>
        </footer>
    </div>

    <!-- Category Management Modal -->
    <div id="category-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div id="modal-overlay" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <div class="bg-white dark:bg-gray-800 px-6 py-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                            <i data-lucide="settings" class="text-blue-600"></i>
                            카테고리 관리
                        </h3>
                        <button id="close-modal" class="text-gray-400 hover:text-gray-500">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2" id="modal-category-list">
                        <!-- Categories will be listed here -->
                    </div>

                    <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row justify-between gap-4">
                        <button id="add-category-btn" class="flex items-center justify-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl font-medium hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i>
                            새 카테고리 추가
                        </button>
                            <button id="copy-categories" class="flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition-colors">
                                <i data-lucide="copy" class="w-5 h-5"></i>
                                설정 복사
                            </button>
                            <button id="download-categories" class="flex items-center justify-center gap-2 px-4 py-2 bg-gray-900 text-white dark:bg-white dark:text-gray-900 rounded-xl font-medium hover:bg-gray-800 dark:hover:bg-gray-100 transition-colors">
                                <i data-lucide="save" class="w-5 h-5"></i>
                                설정 파일 다운로드
                            </button>
                    </div>
                    <p class="mt-4 text-xs text-gray-500 dark:text-gray-400">
                        <i data-lucide="alert-circle" class="inline w-3 h-3 mr-1"></i>
                        다운로드한 <code class="bg-gray-100 dark:bg-gray-700 px-1 rounded">categories.json</code> 파일을 프로젝트의 <code class="bg-gray-100 dark:bg-gray-700 px-1 rounded">docs/data/</code> 폴더에 덮어쓰기 하시면 적용됩니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
